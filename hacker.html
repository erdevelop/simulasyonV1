<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>EU_TERMINAL // INTERACTIVE_OS</title>
    <style>
        body { background: black; margin: 0; overflow: hidden; font-family: 'Courier New', monospace; }
        #matrix-canvas { position: fixed; top: 0; left: 0; z-index: 1; opacity: 0.6; }

        /* Terminal Penceresi */
        #terminal-window {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 70%;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #0F0;
            box-shadow: 0 0 20px #0F0;
            z-index: 2;
            display: flex;
            flex-direction: column;
            padding: 10px;
        }

        #output {
            flex-grow: 1;
            overflow-y: auto;
            color: #0F0;
            font-size: 14px;
            white-space: pre-wrap;
            margin-bottom: 10px;
        }

        .input-line { display: flex; color: #0F0; font-size: 16px; }
        #cmd-input {
            background: transparent;
            border: none;
            color: #0F0;
            outline: none;
            flex-grow: 1;
            font-family: inherit;
            font-size: inherit;
        }

        /* Scrollbar güzelleştirme */
        #output::-webkit-scrollbar { width: 5px; }
        #output::-webkit-scrollbar-thumb { background: #0F0; }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div id="terminal-window" onclick="document.getElementById('cmd-input').focus();">
    <div id="output">EU_OS [Sürüm 2.0.26]
(c) Erdal Üstünol. Tüm hakları saklıdır.
Komut listesi için 'help' yazın.

</div>
    <div class="input-line">
        <span>C:\Users\Erdal></span>
        <input type="text" id="cmd-input" autofocus autocomplete="off" spellcheck="false">
    </div>
</div>

<script>
    // --- MATRIX ARKAPLAN (Önceki ile aynı) ---
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const alphabet = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    const fontSize = 16;
    const columns = canvas.width / fontSize;
    const drops = Array(Math.floor(columns)).fill(1);
    function drawMatrix() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#0F0"; ctx.font = fontSize + "px monospace";
        drops.forEach((y, i) => {
            const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
            ctx.fillText(text, i * fontSize, y * fontSize);
            if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(drawMatrix, 35);

    // --- TERMİNAL MANTIĞI ---
    const input = document.getElementById('cmd-input');
    const output = document.getElementById('output');

    const commands = {
        "help": "Kullanılabilir komutlar:\nhelp, clear, date, time, whoami, status, 3d, python, batch, ipek, contact, weather, projects, calc, color, echo, system, matrix, news, secret, shutdown",
        "clear": "CLS",
        "date": () => new Date().toLocaleDateString(),
        "time": () => new Date().toLocaleTimeString(),
        "whoami": "Kullanıcı: Erdal Üstünol\nMeslek: 3D Tasarım Uzmanı (30 Yıl Deneyim)\nYetkinlik: SolidWorks, AutoCAD, Rhino, Python",
        "status": "Sistem Durumu: Çevrimiçi\nCPU: %12\nBellek: 64GB DDR5\nBağlantı: Şifreli (AES-256)",
        "3d": "3D Modül Başlatılıyor...\nRender motoru aktif.\nSolidWorks dosyaları taranıyor...",
        "python": "Python 3.12.0 interpretter hazır.\n>>> print('Merhaba Dünya')",
        "batch": "Toplu işlem dosyası çalıştırılıyor: backup_archive.bat\nKopyalanıyor... %100",
        "ipek": "Mesaj: Merhaba İpek! Baban seni çok seviyor. ❤️",
        "contact": "E-posta: info@erdalustunol.com\nWeb: erdalustunol.com",
        "weather": "İstanbul: 18°C, Hava Parçalı Bulutlu.",
        "projects": "1. Pasifik Raf Sistemleri Optimizasyonu\n2. Python ile Parametrik Tasarım Otomasyonu\n3. Akıllı Ev Dekorasyon Panelleri",
        "calc": "Kullanım: calc [sayı1] [işlem] [sayı2] (Örn: calc 5 * 10)",
        "color": "Renk paleti güncellendi (Sadece yeşil destekleniyor!).",
        "echo": "Lütfen tekrarlamamı istediğiniz metni yazın.",
        "system": "OS: EU-DOS v2.0\nKernel: 6.2.0-generic-30-year-xp",
        "matrix": "Sinyal güçlendiriliyor... Matrisin içindesin.",
        "news": "2026 Manşeti: AI destekli 3D tasarım standart haline geldi.",
        "secret": "Gizli Mesaj: Kaşığa bakma, kaşık aslında yok.",
        "shutdown": "Sistem kapatılıyor... (Şaka yaptım, buradayım!)"
    };

    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const fullCmd = input.value.trim().toLowerCase();
            const args = fullCmd.split(' ');
            const cmd = args[0];
            
            printToTerminal(`\nC:\\Users\\Erdal> ${input.value}`);

            if (cmd === "clear" || cmd === "cls") {
                output.innerText = "";
            } else if (cmd === "calc") {
                if(args.length === 4) {
                    try { printToTerminal(`Sonuç: ${eval(args[1] + args[2] + args[3])}`); } 
                    catch { printToTerminal("Hata: Geçersiz işlem."); }
                } else { printToTerminal("Kullanım: calc 5 * 4"); }
            } else if (cmd === "echo") {
                printToTerminal(args.slice(1).join(' '));
            } else if (commands[cmd]) {
                const response = typeof commands[cmd] === 'function' ? commands[cmd]() : commands[cmd];
                printToTerminal(response);
            } else if (cmd !== "") {
                printToTerminal(`'${cmd}' komutu tanınmıyor. Yardım için 'help' yazın.`);
            }

            input.value = "";
            output.scrollTop = output.scrollHeight;
        }
    });

    function printToTerminal(text) {
        output.innerText += text + "\n";
    }
</script>

</body>
</html>
